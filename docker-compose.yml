services:
  web:
    build: ./web
    container_name: nas-web
    ports:
      - "8080:80"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./www:/var/www/html
      - ./uploads:/var/www/uploads
      # Bind-mount backups to external folder so they survive container rebuilds.
      # USB / secondary mirroring is handled by a host-side scheduled task
      # (see scripts/mirror_to_usb.ps1) — Docker isn't involved.
      - ./external_backups:/var/www/backups
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: nas-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # No host port exposed — MySQL is reachable only via Docker's internal
    # network from the web and phpmyadmin containers. Closes external attack surface.
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nas-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the NAS to a public HTTPS URL.
  # Quick tunnel: no account or domain needed; URL prints in `docker logs nas-tunnel`.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: nas-tunnel
    command: tunnel --no-autoupdate --url http://web:80
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
